name: Tests

on:
  push:
    branches:
      - main
      - master
      - '*.x'
  pull_request:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [8.1, 8.2, 8.3]

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, simplexml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Execute tests
        run: composer test

  coverage:
    runs-on: ubuntu-latest
    name: Coverage

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, libxml, simplexml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: xdebug

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Execute coverage
        run: composer test:coverage

      - name: Write coverage summary
        run: |
          php -r '$xml = simplexml_load_file("coverage.xml"); $metrics = $xml->project->metrics; $covered = (int) $metrics["coveredstatements"]; $total = (int) $metrics["statements"]; $percent = $total > 0 ? round(($covered / $total) * 100, 2) : 0; file_put_contents(getenv("GITHUB_STEP_SUMMARY"), "## PHPUnit Coverage\n\nStatements: {$percent}% ({$covered}/{$total})\n", FILE_APPEND);'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: phpunit-coverage
          path: coverage.xml
