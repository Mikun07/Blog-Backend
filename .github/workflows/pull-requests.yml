name: Pull Request Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify project documentation exists
        run: |
          test -f README.md
          test -f docs/API.md
          test -f docs/DEPLOYMENT.md
          test -f docs/ENGINEERING_READINESS.md
          test -f SECURITY.md
