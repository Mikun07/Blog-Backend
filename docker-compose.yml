name: blog-backend

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-backend-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_DEBUG: "true"
      APP_ENV: local
      APP_URL: http://localhost:${APP_PORT:-8000}
      CACHE_DRIVER: file
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      DB_CONNECTION: mysql
      DB_DATABASE: blog_backend
      DB_HOST: mysql
      DB_PASSWORD: blog_backend
      DB_PORT: 3306
      DB_USERNAME: blog_backend
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
    ports:
      - "${APP_PORT:-8000}:8000"
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - composer-cache:/tmp/composer-cache
      - vendor:/var/www/html/vendor

  mysql:
    image: mysql:8.0
    container_name: blog-backend-mysql
    environment:
      MYSQL_DATABASE: blog_backend
      MYSQL_PASSWORD: blog_backend
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: blog_backend
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ublog_backend -pblog_backend --silent"]
      interval: 10s
      retries: 10
      start_period: 20s
      timeout: 5s
    ports:
      - "${FORWARD_DB_PORT:-3307}:3306"
    restart: unless-stopped
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  composer-cache:
  mysql-data:
  vendor:
